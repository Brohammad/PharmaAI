name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"

jobs:
  # ── Backend: lint + test + coverage ───────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bcrypt==4.0.1
          pip install -r requirements.txt

      - name: Create .env for tests
        run: |
          cp .env.example .env
          echo "GOOGLE_API_KEY=test-key-not-real" >> .env
          echo "JWT_SECRET_KEY=ci-test-secret-key-32-characters!!" >> .env

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing \
            --ignore=tests/test_agents.py \
            -x
        env:
          ENVIRONMENT: test

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Frontend: install + build ──────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ env.NODE_VERSION }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Docker build smoke test ────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Build Docker image
        run: docker build -t pharmaiq:ci .

      - name: Smoke test container health
        run: |
          docker run -d --name pharmaiq_test \
            -e GOOGLE_API_KEY=test-key \
            -e JWT_SECRET_KEY=ci-docker-test-secret-key-123 \
            -p 8000:8000 pharmaiq:ci
          sleep 8
          curl -sf http://localhost:8000/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Unexpected status: {d}'
          assert d['version'] == '2.0.0', f'Unexpected version: {d}'
          print('Health check passed:', d['status'], d['version'])
          "
          docker logs pharmaiq_test --tail=20
          docker stop pharmaiq_test
